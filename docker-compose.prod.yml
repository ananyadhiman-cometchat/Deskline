# Production / staging compose for integrateddeskline.cometchat-staging.com.
# Architecture: ALB (TLS) -> host nginx (:80) -> these containers (bound to 127.0.0.1).
#
# Usage on the server:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Nothing here is exposed to 0.0.0.0; host nginx is the only public listener.
#
# Ports offset by +1 from stage-1 deployment to allow both to run on the same host:
#   stage-1 → db:5432  backend:4000  web:8080
#   this    → db:5433  backend:4001  web:8081

name: deskline-cometchat

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata_cometchat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4001}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      COMETCHAT_APP_ID: ${COMETCHAT_APP_ID:-}
      COMETCHAT_REGION: ${COMETCHAT_REGION:-}
      COMETCHAT_REST_API_KEY: ${COMETCHAT_REST_API_KEY:-}
      COMETCHAT_WEBHOOK_SECRET: ${COMETCHAT_WEBHOOK_SECRET:-}
      COMETCHAT_AI_AGENT_UID: ${COMETCHAT_AI_AGENT_UID:-}
    ports:
      - "127.0.0.1:4001:4001"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
        VITE_COMETCHAT_APP_ID: ${VITE_COMETCHAT_APP_ID:-}
        VITE_COMETCHAT_REGION: ${VITE_COMETCHAT_REGION:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8081:80"

volumes:
  pgdata_cometchat:
