name: deskline
description: "DeskLine Flutter Mobile Application - Enterprise helpdesk system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  # Permissions (camera, microphone for calls)
  permission_handler: ^11.3.1

  # Local Notifications (foreground system tray display)
  flutter_local_notifications: ^18.0.1

  # CometChat
  cometchat_chat_uikit: ^5.0.0
  cometchat_calls_sdk: ^5.0.2

  # Model Annotations (freezed & json)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Typography
  google_fonts: ^6.2.1

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

  # App Icon Generation
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  # Adaptive icon for Android (API 26+)
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"
