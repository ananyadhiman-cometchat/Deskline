name: deskline
description: "DeskLine Flutter Mobile Application - Enterprise helpdesk system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP Client
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  # Local Notifications (foreground system tray display)
  flutter_local_notifications: ^18.0.1

  # Model Annotations (freezed & json)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Typography
  google_fonts: ^6.2.1

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
