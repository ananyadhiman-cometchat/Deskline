# /etc/nginx/conf.d/integrateddeskline.cometchat-staging.conf
#
# Host nginx for integrateddeskline.cometchat-staging.com (CometChat integration branch).
# TLS is terminated at the ALB, so this server listens on plain HTTP :80.
# The ALB target group health check should hit:  GET /api/health  on port 80.
#
# Ports are offset by +1 from stage-1 (deskline.cometchat-staging.com):
#   stage-1 → backend:4000  web:8080
#   this    → backend:4001  web:8081

# Trust X-Forwarded-* headers from the AWS VPC private ranges so $remote_addr
# becomes the real client IP. Adjust CIDRs to match your VPC if narrower.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Upstreams point at the host-bound docker containers.
# Names are unique to avoid collisions with the stage-1 nginx config.
upstream integrateddeskline_backend {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream integrateddeskline_web {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name integrateddeskline.cometchat-staging.com;

    # Generous body limit for future ticket attachments / Firebase tokens.
    client_max_body_size 25m;

    # Timeouts tuned for normal API traffic; bump for any long-poll endpoints later.
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Standard proxy headers — preserve scheme/host the ALB saw from the client.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # API + auth + admin -> backend container.
    location /api/ {
        proxy_pass http://integrateddeskline_backend;
    }

    # CometChat webhooks land here; route to backend.
    location /webhooks/ {
        proxy_pass http://integrateddeskline_backend;
    }

    # Everything else is the SPA bundle served by the web container's internal nginx.
    location / {
        proxy_pass http://integrateddeskline_web;
    }

    # Don't pollute access logs with ALB health checks.
    location = /api/health {
        access_log off;
        proxy_pass http://integrateddeskline_backend;
    }
}
