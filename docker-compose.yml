name: deskline-cometchat

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"     # loopback only — ALB never touches db
    volumes:
      - pgdata_cometchat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 4000                   # internal
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      COMETCHAT_APP_ID: ${COMETCHAT_APP_ID}
      COMETCHAT_REGION: ${COMETCHAT_REGION}
      COMETCHAT_REST_API_KEY: ${COMETCHAT_REST_API_KEY}
      COMETCHAT_WEBHOOK_SECRET: ${COMETCHAT_WEBHOOK_SECRET}
      COMETCHAT_AI_AGENT_UID: ${COMETCHAT_AI_AGENT_UID}
    ports:
      - "4001:4000"                # 0.0.0.0:4001 -> container 4000 (ALB TG-api-cc)

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-}   # empty -> SPA calls relative /api (ALB routes it)
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
        VITE_COMETCHAT_APP_ID: ${VITE_COMETCHAT_APP_ID:-}
        VITE_COMETCHAT_REGION: ${VITE_COMETCHAT_REGION:-us}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"                  # 0.0.0.0:8081 -> container 80 (ALB TG-web-cc)

volumes:
  pgdata_cometchat: